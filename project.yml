name: SpoolBrowser
options:
  bundleIdPrefix: org.lobato
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

targets:
  SpoolBrowser:
    type: application
    platform: iOS
    configFiles:
      Debug: Base.xcconfig
      Release: Base.xcconfig
    sources:
      - path: SpoolBrowser
        excludes:
          - Resources/Logos
      - path: SpoolBrowser/Resources/Logos
        type: folder
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        PRODUCT_BUNDLE_IDENTIFIER: org.lobato.spoolbrowser
        CODE_SIGN_ENTITLEMENTS: SpoolBrowser/SpoolBrowser.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: SpoolBrowser/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSBluetoothAlwaysUsageDescription: Bluetooth is needed to connect to a label printer
        NSCameraUsageDescription: Camera access is needed to scan QR codes on filament spools
        NFCReaderUsageDescription: NFC access is needed to write spool URLs to NFC tags
        NSLocalNetworkUsageDescription: Local network access is needed to communicate with SpoolHelper on your Mac
        NSBonjourServices:
          - _spoolhelper._tcp
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - spoolbrowser
              - spoolman
            CFBundleURLName: org.lobato.SpoolBrowser
    scheme:
      testTargets:
        - SpoolBrowserTests

  SpoolBrowserTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SpoolBrowserTests
    dependencies:
      - target: SpoolBrowser
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
